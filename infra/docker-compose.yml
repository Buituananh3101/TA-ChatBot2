version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mathbot_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: mathbot
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: mathbot_chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  adminer:
    image: adminer:latest
    container_name: mathbot_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  n8n:
    image: n8nio/n8n:latest
    container_name: mathbot_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      # Backend sẽ chạy ở host machine, n8n dùng host.docker.internal để gọi
      # Nếu backend cũng chạy trong Docker, đổi thành tên container
      - WEBHOOK_URL=http://localhost:5678
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql

volumes:
  mysql_data:
  chroma_data:
  n8n_data:
